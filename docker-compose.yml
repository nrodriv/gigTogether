services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: gigtogether
      POSTGRES_PASSWORD: gigtogether
      POSTGRES_DB: gigtogether_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gigtogether"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
